<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookFlow Pro — Librería Virtual</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --accent: #6366f1;
            --text: #f8fafc; --text-soft: #94a3b8; --border: rgba(255,255,255,0.1);
            --success: #22c55e; --danger: #f43f5e; --radius: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Pantalla de Bloqueo PIN */
        .lock-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .pin-dots { display: flex; gap: 20px; margin-bottom: 30px; }
        .dot { width: 18px; height: 18px; border: 2px solid var(--accent); border-radius: 50%; }
        .dot.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .numpad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; }
        .num-btn { 
            width: 80px; height: 80px; border-radius: 50%; border: 1px solid var(--border);
            background: var(--surface); color: white; font-size: 24px; cursor: pointer; transition: 0.2s;
        }
        .num-btn:hover { background: var(--accent); }

        /* Layout Principal */
        .app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
        .sidebar { background: #020617; padding: 30px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .logo { font-family: 'Syne', sans-serif; font-size: 24px; margin-bottom: 40px; color: var(--accent); }
        .nav-btn {
            padding: 14px 18px; border-radius: 12px; border: none; background: transparent;
            color: var(--text-soft); text-align: left; cursor: pointer; margin-bottom: 5px; font-weight: 600;
        }
        .nav-btn.active { background: var(--accent); color: white; }

        /* Dashboard Admin */
        .main { padding: 40px; overflow-y: auto; }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--surface); padding: 25px; border-radius: var(--radius); border: 1px solid var(--border); }
        .stat-val { font-size: 32px; font-weight: 800; display: block; margin-top: 10px; }
        
        /* Tablas */
        .table-container { background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(0,0,0,0.2); padding: 15px; text-align: left; font-size: 12px; color: var(--text-soft); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        /* Formularios */
        .form-card { max-width: 600px; background: var(--surface); padding: 30px; border-radius: 20px; }
        input, select, textarea {
            width: 100%; padding: 12px; background: #0f172a; border: 1px solid var(--border);
            border-radius: 10px; color: white; margin-top: 8px; margin-bottom: 20px;
        }
        .btn-main { background: var(--accent); color: white; padding: 15px; border: none; border-radius: 12px; width: 100%; cursor: pointer; font-weight: 700; }

        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body>

    <div id="lock-screen" class="lock-screen">
        <div class="logo">BOOKFLOW <span>ACCESS</span></div>
        <div class="pin-dots" id="pin-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="numpad">
            <button class="num-btn" onclick="pressKey('1')">1</button>
            <button class="num-btn" onclick="pressKey('2')">2</button>
            <button class="num-btn" onclick="pressKey('3')">3</button>
            <button class="num-btn" onclick="pressKey('4')">4</button>
            <button class="num-btn" onclick="pressKey('5')">5</button>
            <button class="num-btn" onclick="pressKey('6')">6</button>
            <button class="num-btn" onclick="pressKey('7')">7</button>
            <button class="num-btn" onclick="pressKey('8')">8</button>
            <button class="num-btn" onclick="pressKey('9')">9</button>
            <button class="num-btn" style="color:var(--danger)" onclick="clearPin()">C</button>
            <button class="num-btn" onclick="pressKey('0')">0</button>
        </div>
    </div>

    <div class="app">
        <aside class="sidebar">
            <div class="logo">BookFlow Pro</div>
            <nav style="flex:1">
                <button class="nav-btn active" onclick="showView('clients')">👥 Clientes</button>
                <button class="nav-btn" onclick="showView('sales')">📝 Registrar Venta</button>
                <button class="nav-btn" onclick="showView('providers')">🏠 Proveedores</button>
                <button id="admin-nav" class="nav-btn" style="display:none" onclick="showView('admin')">📊 Panel Admin</button>
            </nav>
            <div id="user-tag" style="font-size: 12px; color: var(--text-soft)">Usuario: -</div>
            <button class="nav-btn" style="color:var(--danger)" onclick="location.reload()">Cerrar Sesión</button>
        </aside>

        <main class="main">
            <section id="view-clients" class="view active">
                <h2>Directorio de Acumulados</h2>
                <div class="table-container" style="margin-top: 20px;">
                    <table>
                        <thead>
                            <tr>
                                <th>Cliente</th>
                                <th>Dirección Completa</th>
                                <th>Libros</th>
                                <th>Total</th>
                                <th>Abonado</th>
                                <th>Resta</th>
                            </tr>
                        </thead>
                        <tbody id="client-table-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="view-sales" class="view">
                <h2>Registrar Nueva Compra/Abono</h2>
                <div class="form-card" style="margin-top: 20px;">
                    <form id="sale-form">
                        <label>Seleccionar Cliente</label>
                        <select id="sale-client-select" required></select>
                        
                        <label>Cantidad de Libros comprados hoy</label>
                        <input type="number" id="sale-qty" value="1" required>

                        <label>Monto de la Venta ($)</label>
                        <input type="number" id="sale-amount" placeholder="0.00" required>

                        <label>Abono Realizado ($)</label>
                        <input type="number" id="sale-payment" placeholder="0.00" value="0">

                        <button type="submit" class="btn-main">Guardar en Histórico</button>
                    </form>
                </div>
            </section>

            <section id="view-admin" class="view">
                <h2>Métricas de Negocio</h2>
                <div class="grid-stats">
                    <div class="stat-card">
                        <span class="stat-lbl">Ingresos Totales</span>
                        <span class="stat-val" id="stat-revenue">$0.00</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-lbl">Libros Vendidos</span>
                        <span class="stat-val" id="stat-books">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-lbl">Cuentas por Cobrar</span>
                        <span class="stat-val" style="color:var(--danger)" id="stat-debt">$0.00</span>
                    </div>
                </div>
                
                <div style="background: var(--surface); padding: 20px; border-radius: 16px;">
                    <canvas id="salesChart" height="100"></canvas>
                </div>
                
            </section>
        </main>
    </div>

    <script>
        // CONFIGURACIÓN (REEMPLAZA CON TU URL)
        const SCRIPT_URL = "TU_URL_DE_APPS_SCRIPT_AQUI";

        let state = {
            currentUser: null,
            clients: [],
            sales: [],
            pin: ""
        };

        // Usuarios (El admin puede añadir más desde la base de datos)
        const mockUsers = [
            { name: "Administrador", pin: "1234", role: "admin" },
            { name: "Cajero 1", pin: "0000", role: "user" }
        ];

        function pressKey(num) {
            if (state.pin.length < 4) {
                state.pin += num;
                updatePinUI();
                if (state.pin.length === 4) login();
            }
        }

        function updatePinUI() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => dot.classList.toggle('active', i < state.pin.length));
        }

        function clearPin() { state.pin = ""; updatePinUI(); }

        function login() {
            const user = mockUsers.find(u => u.pin === state.pin);
            if (user) {
                state.currentUser = user;
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('user-tag').textContent = "Usuario: " + user.name;
                if (user.role === 'admin') document.getElementById('admin-nav').style.display = 'block';
                loadData();
            } else {
                alert("PIN Incorrecto");
                clearPin();
            }
        }

        function showView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            if(viewId === 'admin') renderCharts();
        }

        async function loadData() {
            // Aquí llamarías a SCRIPT_URL para obtener datos reales
            // Por ahora usaremos datos de ejemplo para visualizar el diseño
            state.clients = [
                { id: 1, name: "Ana López", address: "Calle Falsa 123, Int 4, CDMX", bookCount: 12, totalDebt: 4500, totalPaid: 2000 },
                { id: 2, name: "Pedro Paramo", address: "Av. Siempre Viva 742, Col. Centro", bookCount: 5, totalDebt: 1200, totalPaid: 1200 }
            ];
            renderClients();
        }

        function renderClients() {
            const body = document.getElementById('client-table-body');
            const select = document.getElementById('sale-client-select');
            body.innerHTML = "";
            select.innerHTML = "";

            state.clients.forEach(c => {
                const rest = c.totalDebt - c.totalPaid;
                body.innerHTML += `
                    <tr>
                        <td><strong>${c.name}</strong></td>
                        <td style="color:var(--text-soft)">${c.address}</td>
                        <td class="mono">${c.bookCount}</td>
                        <td class="mono">$${c.totalDebt}</td>
                        <td class="mono" style="color:var(--success)">$${c.totalPaid}</td>
                        <td class="mono" style="color:${rest > 0 ? 'var(--danger)' : 'var(--success)'}">$${rest}</td>
                    </tr>
                `;
                select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });
        }

        function renderCharts() {
            const ctx = document.getElementById('salesChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab', 'Dom'],
                    datasets: [{
                        label: 'Ventas Semanales',
                        data: [1200, 1900, 3000, 5000, 2300, 3400, 4100],
                        borderColor: '#6366f1',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(99, 102, 241, 0.1)'
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } }
                }
            });
        }

        // Manejo de Formulario de Ventas
        document.getElementById('sale-form').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                action: 'write',
                tab: 'Ventas',
                rows: [{
                    id: Date.now(),
                    date: new Date().toISOString(),
                    customerId: document.getElementById('sale-client-select').value,
                    customerName: document.getElementById('sale-client-select').selectedOptions[0].text,
                    amount: document.getElementById('sale-amount').value,
                    payment: document.getElementById('sale-payment').value,
                    booksQty: document.getElementById('sale-qty').value,
                    sellerName: state.currentUser.name
                }]
            };
            
            // Simulación de envío
            console.log("Enviando a base de datos:", payload);
            alert("Venta registrada con éxito");
            showView('clients');
        };

    </script>
</body>
</html>
