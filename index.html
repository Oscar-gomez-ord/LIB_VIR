<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookFlow Premium | Librería Virtual</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Syne:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5; --bg: #f8fafc; --surface: #ffffff;
            --text: #0f172a; --text-soft: #64748b; --border: #e2e8f0;
            --success: #10b981; --danger: #f43f5e; --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); }

        /* Screens */
        .full-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: var(--surface); padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        
        /* PIN Pad */
        .pin-dots { display: flex; justify-content: center; gap: 15px; margin: 25px 0; }
        .dot { width: 14px; height: 14px; border: 2px solid var(--border); border-radius: 50%; }
        .dot.active { background: var(--primary); border-color: var(--primary); transform: scale(1.2); }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-num { background: white; border: 1px solid var(--border); padding: 20px; border-radius: 12px; font-size: 1.2rem; cursor: pointer; }
        .btn-num:hover { border-color: var(--primary); color: var(--primary); }

        /* Sidebar & Layout */
        .app-layout { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
        .sidebar { background: #ffffff; border-right: 1px solid var(--border); padding: 30px; display: flex; flex-direction: column; }
        .nav-btn { padding: 12px; border-radius: 10px; cursor: pointer; margin-bottom: 8px; font-weight: 600; color: var(--text-soft); transition: 0.2s; border:none; background:transparent; text-align:left;}
        .nav-btn.active { background: #eef2ff; color: var(--primary); }
        .main { padding: 40px; overflow-y: auto; }

        /* Dashboard */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); }
        .stat-card small { color: var(--text-soft); font-size: 12px; }
        .stat-card p { font-size: 24px; font-weight: 800; margin-top: 5px; }

        /* Forms & Tables */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: var(--radius); overflow: hidden; }
        th { background: #f1f5f9; padding: 15px; text-align: left; font-size: 12px; color: var(--text-soft); }
        td { padding: 15px; border-top: 1px solid var(--border); font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; margin: 8px 0 15px; }
        .btn-p { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; }

        .view { display: none; }
        .view.active { display: block; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="screen-setup" class="full-screen">
        <div class="card">
            <h2 style="font-family:'Syne'">Conectar Base</h2>
            <p style="color:var(--text-soft); font-size:14px; margin:10px 0 20px">Pega la URL de tu Apps Script</p>
            <input type="text" id="input-url" placeholder="https://script.google.com/...">
            <button class="btn-p" id="btn-connect" onclick="connectDB()">Conectar Sistema</button>
            <div id="setup-loader" style="display:none; margin-top:15px"><div class="loader"></div></div>
        </div>
    </div>

    <div id="screen-login" class="full-screen" style="display:none">
        <div class="card">
            <h2 id="login-title">Acceso</h2>
            <div class="pin-dots" id="pin-dots">
                <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="numpad">
                <button class="btn-num" onclick="pressPin('1')">1</button>
                <button class="btn-num" onclick="pressPin('2')">2</button>
                <button class="btn-num" onclick="pressPin('3')">3</button>
                <button class="btn-num" onclick="pressPin('4')">4</button>
                <button class="btn-num" onclick="pressPin('5')">5</button>
                <button class="btn-num" onclick="pressPin('6')">6</button>
                <button class="btn-num" onclick="pressPin('7')">7</button>
                <button class="btn-num" onclick="pressPin('8')">8</button>
                <button class="btn-num" onclick="pressPin('9')">9</button>
                <button class="btn-num" style="color:var(--danger)" onclick="clearPin()">C</button>
                <button class="btn-num" onclick="pressPin('0')">0</button>
            </div>
        </div>
    </div>

    <div id="app" class="app-layout" style="display:none">
        <aside class="sidebar">
            <h2 style="font-family:'Syne'; color:var(--primary); margin-bottom:30px">BookFlow</h2>
            <nav style="flex:1">
                <button class="nav-btn active" onclick="switchView('dash', this)">📊 Dashboard</button>
                <button class="nav-btn" onclick="switchView('clients', this)">👥 Clientes</button>
                <button class="nav-btn" onclick="switchView('pos', this)">🛒 Nueva Venta</button>
                <button id="nav-users" class="nav-btn" style="display:none" onclick="switchView('users', this)">🔑 Usuarios</button>
            </nav>
            <div id="user-info" style="font-size:12px; color:var(--text-soft); border-top:1px solid var(--border); padding-top:15px">
                Usuario: <b id="current-name"></b>
                <p style="cursor:pointer; color:var(--danger); margin-top:5px" onclick="location.reload()">Salir</p>
            </div>
        </aside>

        <main class="main">
            <section id="view-dash" class="view active">
                <div class="stats">
                    <div class="stat-card"><small>INGRESOS TOTALES</small><p id="stat-money">$0</p></div>
                    <div class="stat-card"><small>LIBROS EN MANOS</small><p id="stat-books">0</p></div>
                    <div class="stat-card"><small>DEUDA PENDIENTE</small><p id="stat-debt" style="color:var(--danger)">$0</p></div>
                </div>
                <div style="background:white; padding:20px; border-radius:12px; border:1px solid var(--border)">
                    <canvas id="chartSales" height="100"></canvas>
                </div>
                
            </section>

            <section id="view-clients" class="view">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                    <h2>Lista de Clientes</h2>
                    <button class="btn-p" style="width:auto" onclick="openClientForm()">+ Nuevo Cliente</button>
                </div>
                <table>
                    <thead>
                        <tr><th>Nombre</th><th>Dirección</th><th>Libros</th><th>Adeudo</th><th>Acciones</th></tr>
                    </thead>
                    <tbody id="table-clients"></tbody>
                </table>
            </section>

            <section id="view-pos" class="view">
                <h2>Registrar Compra</h2>
                <div style="background:white; padding:30px; border-radius:12px; margin-top:20px; max-width:500px; border:1px solid var(--border)">
                    <form id="form-sale">
                        <label>Cliente</label>
                        <select id="sale-client" required></select>
                        <label>Total Compra ($)</label>
                        <input type="number" id="sale-amount" required>
                        <label>Abono hoy ($)</label>
                        <input type="number" id="sale-paid" value="0">
                        <label>Cant. Libros</label>
                        <input type="number" id="sale-qty" value="1">
                        <label>Screenshot / Link Pago</label>
                        <input type="text" id="sale-img" placeholder="URL o Nota">
                        <button type="submit" class="btn-p">Guardar Venta</button>
                    </form>
                </div>
            </section>

            <section id="view-users" class="view">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                    <h2>Gestión de Personal</h2>
                    <button class="btn-p" style="width:auto" onclick="openUserForm()">+ Nuevo Usuario</button>
                </div>
                <table id="table-users">
                    <thead><tr><th>Nombre</th><th>Rol</th><th>PIN</th><th>Acciones</th></tr></thead>
                    <tbody id="body-users"></tbody>
                </table>
            </section>
        </main>
    </div>

    <script>
        let state = {
            url: localStorage.getItem('bf_url'),
            user: null,
            pin: "",
            data: { clients: [], sales: [], users: [] }
        };

        async function connectDB() {
            const url = document.getElementById('input-url').value;
            if(!url.includes('script.google.com')) return alert('URL no válida');
            
            document.getElementById('btn-connect').disabled = true;
            document.getElementById('setup-loader').style.display = 'block';

            try {
                localStorage.setItem('bf_url', url);
                state.url = url;
                const check = await api('read', { tab: 'Usuarios' });
                if(check.ok) {
                    if(check.rows.length === 0) {
                        // Crear primer admin
                        await api('write', { tab: 'Usuarios', rows: [{ id: '1', name: 'Admin Principal', pin: '1234', role: 'admin' }] });
                    }
                    location.reload();
                } else {
                    throw new Error();
                }
            } catch(e) {
                alert('Error de conexión. Verifica que el Script esté publicado como App Web para "Cualquiera".');
                localStorage.removeItem('bf_url');
                location.reload();
            }
        }

        async function api(action, body) {
            const res = await fetch(state.url, {
                method: 'POST',
                mode: 'no-cors', // Importante para evitar ciertos bugs de redirect en Apps Script
                body: JSON.stringify({ action, ...body })
            });
            // Debido a mode 'no-cors', no podemos leer la respuesta directamente, 
            // pero Apps Script suele procesar el POST. 
            // Para lectura, usaremos un truco de fetch normal:
            const realRes = await fetch(state.url + "?action=" + action + "&tab=" + (body.tab || ""));
            return await realRes.json();
        }

        async function sync() {
            const [u, c, s] = await Promise.all([
                api('read', { tab: 'Usuarios' }),
                api('read', { tab: 'Clientes' }),
                api('read', { tab: 'Ventas' })
            ]);
            state.data.users = u.rows || [];
            state.data.clients = c.rows || [];
            state.data.sales = s.rows || [];
            renderAll();
        }

        function pressPin(n) {
            if(state.pin.length < 4) {
                state.pin += n;
                const dots = document.querySelectorAll('.dot');
                dots.forEach((d, i) => d.classList.toggle('active', i < state.pin.length));
                if(state.pin.length === 4) login();
            }
        }

        function login() {
            const found = state.data.users.find(u => u.pin === state.pin);
            if(found) {
                state.user = found;
                document.getElementById('screen-login').style.display = 'none';
                document.getElementById('app').style.display = 'grid';
                document.getElementById('current-name').innerText = found.name;
                if(found.role === 'admin') document.getElementById('nav-users').style.display = 'block';
                switchView('dash', document.querySelector('.nav-btn'));
            } else {
                alert('PIN Incorrecto');
                clearPin();
            }
        }

        function clearPin() {
            state.pin = "";
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        }

        function switchView(id, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            btn.classList.add('active');
            if(id === 'dash') renderCharts();
        }

        function renderAll() {
            // Clientes
            const tClients = document.getElementById('table-clients');
            tClients.innerHTML = state.data.clients.map(c => {
                const resta = parseFloat(c.totalDebt) - parseFloat(c.totalPaid);
                return `<tr>
                    <td><b>${c.name}</b></td>
                    <td>${c.address}</td>
                    <td>${c.bookCount}</td>
                    <td>$${resta.toFixed(2)}</td>
                    <td><button onclick="deleteItem('Clientes','id','${c.id}')">🗑</button></td>
                </tr>`;
            }).join('');

            // Usuarios
            document.getElementById('body-users').innerHTML = state.data.users.map(u => `
                <tr><td>${u.name}</td><td>${u.role}</td><td>${u.pin}</td><td><button onclick="deleteItem('Usuarios','id','${u.id}')">🗑</button></td></tr>
            `).join('');

            // Stats
            const totalCash = state.data.sales.reduce((acc, v) => acc + parseFloat(v.amount), 0);
            const totalBooks = state.data.clients.reduce((acc, c) => acc + parseInt(c.bookCount), 0);
            const totalDebt = state.data.clients.reduce((acc, c) => acc + (parseFloat(c.totalDebt) - parseFloat(c.totalPaid)), 0);
            document.getElementById('stat-money').innerText = "$" + totalCash.toLocaleString();
            document.getElementById('stat-books').innerText = totalBooks;
            document.getElementById('stat-debt').innerText = "$" + totalDebt.toLocaleString();

            // Select
            document.getElementById('sale-client').innerHTML = state.data.clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        async function deleteItem(tab, field, val) {
            if(!confirm('¿Eliminar?')) return;
            // Usamos POST simple para eliminar
            await fetch(state.url, { method: 'POST', body: JSON.stringify({ action: 'deleteRow', tab, idField: field, idValue: val }) });
            location.reload();
        }

        function renderCharts() {
            const ctx = document.getElementById('chartSales').getContext('2d');
            if(window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: state.data.sales.slice(-7).map(s => s.date.split('T')[0]),
                    datasets: [{
                        label: 'Ventas ($)',
                        data: state.data.sales.slice(-7).map(s => s.amount),
                        borderColor: '#4f46e5',
                        tension: 0.3,
                        fill: true,
                        backgroundColor: 'rgba(79, 70, 229, 0.05)'
                    }]
                }
            });
        }

        // Forms
        async function openClientForm() {
            const name = prompt("Nombre del cliente:");
            const addr = prompt("Dirección:");
            if(name && addr) {
                await fetch(state.url, { method: 'POST', body: JSON.stringify({ 
                    action: 'write', tab: 'Clientes', rows: [{ id: Date.now().toString(), name, address: addr, totalDebt: 0, totalPaid: 0, bookCount: 0 }] 
                }) });
                location.reload();
            }
        }

        async function openUserForm() {
            const name = prompt("Nombre:");
            const pin = prompt("PIN (4 dígitos):");
            const role = prompt("Rol (admin o user):");
            if(name && pin) {
                await fetch(state.url, { method: 'POST', body: JSON.stringify({ 
                    action: 'write', tab: 'Usuarios', rows: [{ id: Date.now().toString(), name, pin, role }] 
                }) });
                location.reload();
            }
        }

        document.getElementById('form-sale').onsubmit = async (e) => {
            e.preventDefault();
            const cid = document.getElementById('sale-client').value;
            const amount = parseFloat(document.getElementById('sale-amount').value);
            const paid = parseFloat(document.getElementById('sale-paid').value);
            const qty = parseInt(document.getElementById('sale-qty').value);

            const client = state.data.clients.find(c => c.id == cid);
            
            await fetch(state.url, { method: 'POST', body: JSON.stringify({ 
                action: 'write', tab: 'Ventas', rows: [{ id: Date.now().toString(), date: new Date().toISOString(), customerId: cid, amount, payment: paid, booksQty: qty }] 
            }) });

            await fetch(state.url, { method: 'POST', body: JSON.stringify({ 
                action: 'updateRow', tab: 'Clientes', idField: 'id', idValue: cid, updates: { 
                    totalDebt: parseFloat(client.totalDebt) + amount, 
                    totalPaid: parseFloat(client.totalPaid) + paid,
                    bookCount: parseInt(client.bookCount) + qty
                } 
            }) });

            location.reload();
        }

        // Inicio
        if(state.url) {
            document.getElementById('screen-setup').style.display = 'none';
            document.getElementById('screen-login').style.display = 'flex';
            sync();
        }
    </script>
</body>
</html>
</body>
</html>
